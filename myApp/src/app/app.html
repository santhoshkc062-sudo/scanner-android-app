<div class="app-container">

  <div *ngIf="!isIpSet" class="ip-screen">
    <h2 class="title">Set Server IP</h2>
    <input type="text" placeholder="192.168.1.1" [(ngModel)]="ipAddress" class="modern-input" />
    <button class="btn-primary" (click)="setIp()">Save & Continue</button>
  </div>

  <div *ngIf="isIpSet && !scanResult" class="scanner-screen">
    
    <button class="btn-settings" (click)="resetIp()">
      <span class="icon">⚙</span>
    </button>

    <div class="center-content">
      <div class="scanner-container">
        <img src="assets/Scan.gif" alt="Scanner" class="scanner-img">
        <div class="scan-frame"></div> </div>
      
      <h2 class="scan-text">SCAN</h2>
      <p class="sub-text">Align QR code within the frame</p>
      
      <button class="btn-scan-start" (click)="scanQR()">Start Scan</button>
    </div>
  </div>

  <div *ngIf="scanResult" class="success-screen">
    <div class="result-card">
      <h3>Scan Successful</h3>
      <div class="result-box">{{ scanResult }}</div>
<button class="btn-primary" (click)="rescan()">Scan Again</button>
      <button class="btn-text" (click)="scanResult = ''">Back</button>
    </div>
  </div>

  <div>
    <button class="btn-clear"  (click)="datasent()" >Clear Data</button>
  </div>

</div>
